name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-assets:
    uses: ./.github/workflows/build-assets.yml

  rust:
    needs: build-assets
    uses: ./.github/workflows/rust.yml

  python:
    needs: build-assets
    uses: ./.github/workflows/python.yml
