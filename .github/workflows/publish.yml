name: Publish
on:
  push:
    branches:
      - main
jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for release commit
        id: check
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MESSAGE" =~ ^release:\ bump\ version\ to\ ([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
              echo "Detected release for version ${BASH_REMATCH[1]}"
          else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Not a release commit"
          fi

  build-rust-cli:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust CLI binary
        run: cargo build --release -p expman-cli
      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-binary
          path: target/release/exp

  build-python-wheels:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist
        run: uv build --sdist --out-dir dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-crates:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: CARGO
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish expman
        run: cargo publish -p expman --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish expman-server
        run: cargo publish -p expman-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish expman-cli
        run: cargo publish -p expman-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Wait a bit for crates.io index to update
      - run: sleep 60

  release-pypi:
    needs: [check-release, publish-crates, build-python-wheels, build-sdist]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: PYPI
    steps:
      - uses: astral-sh/setup-uv@v5
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: [check-release, build-rust-cli, build-python-wheels, build-sdist]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: GITHUB
    permissions:
      contents: write
    steps:
      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: cli-binary
          path: target/release
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: Release v${{ needs.check-release.outputs.version }}
          files: |
            target/release/exp
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
