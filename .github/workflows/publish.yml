name: Publish

on:
  push:
    branches: ["main"]

jobs:
  check-release:
    uses: ./.github/workflows/check-release.yml

  build-assets:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/build-assets.yml

  publish-cargo:
    needs: [check-release, build-assets]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/publish-cargo.yml
    with:
      frontend-artifact: ${{ needs.build-assets.outputs.frontend-artifact }}
    secrets: inherit

  publish-pypi:
    needs: [check-release, build-assets]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    with:
      frontend-artifact: ${{ needs.build-assets.outputs.frontend-artifact }}
      cli-artifact-prefix: ${{ needs.build-assets.outputs.cli-artifact-prefix }}
    secrets: inherit

  github-release:
    needs: [check-release, publish-pypi]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/github-release.yml
    with:
      version: ${{ needs.check-release.outputs.version }}
      artifact-pattern: "wheels-*"
    secrets: inherit
