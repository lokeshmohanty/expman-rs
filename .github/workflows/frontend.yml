name: Frontend CI

on:
  workflow_call:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check frontend compiles for wasm32
        run: cargo check -p expman --lib --target wasm32-unknown-unknown
