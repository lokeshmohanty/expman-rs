name: Python CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "wrappers/python/pyproject.toml"
      - name: Python lint (Ruff)
        run: just lint-py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: astral-sh/setup-uv@v4
        with:
          cache-dependency-glob: "wrappers/python/pyproject.toml"
      - name: Download CLI
        uses: actions/download-artifact@v4
        with:
          name: cli-bin-${{ runner.os == 'Windows' && 'windows-latest' || runner.os == 'macOS' && 'macos-latest' || 'ubuntu-latest' }}
          path: bin-assets
      - name: Build and test
        run: |
          just bundle-cli-bin bin-assets
          cd wrappers/python
          uv sync --extra dev
          # Skip frontend build since we already have the CLI binary
          export EXPMAN_SKIP_FRONTEND_BUILD=1
          uv build --wheel --out-dir dist
          uv pip install dist/*.whl
          uv run pytest tests
